server:
  port: 8093
spring:
  application:
    name: rococo-museum
  datasource:
    hikari:
      connection-timeout: 20000
      minimum-idle: 10
      maximum-pool-size: 30
      idle-timeout: 10000
      max-lifetime: 1000
      auto-commit: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    schemas: public
    locations: classpath:db/migration/rococo-museum
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        jdbc:
          lob:
            non_contextual_creation: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
    generate-ddl: true
    open-in-view: false

logging:
  file:
    path: ./logs/rococo-museum
  level:
    org.flywaydb: TRACE
    root: INFO
    org.springframework.kafka: INFO
    org.springframework.web: INFO
    org.springframework.ws: INFO
    org.springframework.boot.autoconfigure: INFO

---
spring:
  config:
    activate:
      on-profile: 'local'
  autoconfigure:
    exclude:
      - 'org.springframework.cloud.vault.config.VaultAutoConfiguration'
      - 'org.springframework.cloud.vault.config.VaultObservationAutoConfiguration'
      - 'org.springframework.cloud.vault.config.VaultReactiveAutoConfiguration'
  #  kafka:
  #    bootstrap-servers: 'localhost:9092'
  #    consumer:
  #      group-id: 'museum'
  #      auto-offset-reset: earliest
  datasource:
    url: 'jdbc:postgresql://localhost:5432/rococo-museum'
    username: postgres
    password: secret

  grpc:
    server:
      port: 8095
      max-inbound-message-size: 1MB
      security:
        enabled: false
---
spring:
  config:
    activate:
      on-profile: 'docker'
  autoconfigure:
    exclude:
      - 'org.springframework.cloud.vault.config.VaultAutoConfiguration'
      - 'org.springframework.cloud.vault.config.VaultObservationAutoConfiguration'
      - 'org.springframework.cloud.vault.config.VaultReactiveAutoConfiguration'
  kafka:
    bootstrap-servers: 'kafka:9092'
    consumer:
      group-id: 'museum'
      auto-offset-reset: earliest
  datasource:
    url: 'jdbc:postgresql://rococo-all-db:5432/rococo-museum'
    username: postgres
    password: secret
  grpc:
    server:
      port: 8095
      max-inbound-message-size: 1MB
      security:
        enabled: false
---