syntax = "proto3";
import "rococo-country.proto";
import "rococo-artist.proto";
import "rococo-museum.proto";


package olmerk.grpc.rococo;

option java_multiple_files = true;
option java_package = "olmerk.grpc.rococo";
option java_outer_classname = "RococoPaintingProto";

service RococoPaintingService {
  rpc GetAllPainting(PaintingRequest) returns (PaintingsResponse) {}
  rpc GetPaintingById (GetPaintingRequest) returns (PaintingResponse) {}
  rpc GetPaintingsByAuthorId(GetPaintingByAuthorRequest) returns (PaintingsResponse) {}
  rpc CreatePainting(CreatePaintingRequest) returns (PaintingResponse);
  rpc UpdatePainting(UpdatePaintingRequest) returns (PaintingResponse);
}


message PaintingRequest {
  optional string title = 1;
  int32 page = 2;
  int32 size = 3;
}

message GetPaintingByAuthorRequest {
  string id = 1;
  int32 page = 2;
  int32 size = 3;
}

message GetPaintingByAuthorResponse {
  repeated Painting painting = 1;
  int32 total_count = 2;
}


message CreatePaintingRequest {
  string title = 1;
  string description = 2;
  string content = 3;
  Artist artist = 4;
  Museum museum = 5;
}

message UpdatePaintingRequest {
  string title = 1;
  string description = 2;
  string content = 3;
  Artist artist = 4;
  Museum museum = 5;
}

message PaintingsResponse {
  repeated Painting painting = 1;
  int32 total_count = 2;
}

message Painting {
  string id = 1;
  string title = 2;
  string description = 3;
  string content = 4;
  Artist artist = 5;
  Museum museum = 6;
}


message GetPaintingRequest {
  string id = 1;
}

message PaintingResponse {
  Painting painting = 1;
}