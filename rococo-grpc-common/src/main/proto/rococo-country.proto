syntax = "proto3";


package olmerk.grpc.rococo;

option java_multiple_files = true;
option java_package = "olmerk.grpc.rococo";
option java_outer_classname = "RococoCountryProto";

service RococoCountryService {
  rpc GetAllCountries (CountryRequest) returns (CountriesResponse) {}
}

message CountryRequest {
  int32 page = 2;
  int32 size = 3;
}

message CountriesResponse {
  repeated Country country = 1;
  int32 total_count = 2;
}

message Country {
  string id = 1;
  optional string name = 2;
}