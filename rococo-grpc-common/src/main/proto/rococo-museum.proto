syntax = "proto3";
import "rococo-country.proto";


package olmerk.grpc.rococo;

option java_multiple_files = true;
option java_package = "olmerk.grpc.rococo";
option java_outer_classname = "RococoMuseumProto";

service RococoMuseumService {
  rpc GetAllMuseums(MuseumRequest) returns (MuseumsResponse) {}
  rpc GetMuseumById (GetMuseumRequest) returns (MuseumResponse) {}
  rpc CreateMuseum(CreateMuseumRequest) returns (MuseumResponse);
  rpc UpdateMuseum(UpdateMuseumRequest) returns (MuseumResponse);
}


message MuseumRequest {
  optional string name = 1;
  int32 page = 2;
  int32 size = 3;
}

message CreateMuseumRequest {
  string title = 1;
  string description = 2;
  string photo = 3;
  Geo geo = 4;
}

message UpdateMuseumRequest {
  string title = 1;
  string description = 2;
  string photo = 3;
  Geo geo = 4;
}

message MuseumsResponse {
  repeated Museum museum = 1;
  int32 total_count = 2;
}

message Museum {
  string id = 1;
  string title = 2;
  string description = 3;
  string photo = 4;
  Geo geo = 5;
}

message Geo {
  string city = 1;
  Country country = 2;
}

message GetMuseumRequest {
  string id = 1;
}

message MuseumResponse {
  Museum museum = 1;
}