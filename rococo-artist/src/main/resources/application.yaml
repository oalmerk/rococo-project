server:
  port: 8091
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.grpc.server.security.GrpcSecurityAutoConfiguration
      - org.springframework.grpc.autoconfigure.server.security.GrpcSecurityAutoConfiguration

spring:
  application:
    name: rococo-artist
  datasource:
    hikari:
      connection-timeout: 20000
      minimum-idle: 10
      maximum-pool-size: 30
      idle-timeout: 10000
      max-lifetime: 1000
      auto-commit: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    schemas: public
    locations: classpath:db/migration/rococo-artist
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        jdbc:
          lob:
            non_contextual_creation: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
    generate-ddl: true
    open-in-view: false

logging:
  file:
    path: ./logs/rococo-artist
  level:
    root: INFO
    org.springframework.kafka: INFO
    org.springframework.web: INFO
    org.springframework.ws: INFO
    org.springframework.boot.autoconfigure: INFO

---
spring:
  config:
    activate:
      on-profile: 'local'
  autoconfigure:
    exclude:
      - 'org.springframework.cloud.vault.config.VaultAutoConfiguration'
      - 'org.springframework.cloud.vault.config.VaultObservationAutoConfiguration'
      - 'org.springframework.cloud.vault.config.VaultReactiveAutoConfiguration'
      - 'org.springframework.grpc.autoconfigure.server.security.GrpcSecurityAutoConfiguration'
  kafka:
    bootstrap-servers: 'localhost:9092'
    consumer:
      group-id: 'artist'
      auto-offset-reset: earliest
  datasource:
    url: 'jdbc:postgresql://localhost:5432/rococo-artist'
    username: postgres
    password: secret
  grpc:
    server:
      port: 8092
      max-inbound-message-size: 1MB
      security:
        enabled: false

---
spring:
  config:
    activate:
      on-profile: 'docker'
  autoconfigure:
    exclude:
      - 'org.springframework.cloud.vault.config.VaultAutoConfiguration'
      - 'org.springframework.cloud.vault.config.VaultObservationAutoConfiguration'
      - 'org.springframework.cloud.vault.config.VaultReactiveAutoConfiguration'
  kafka:
    bootstrap-servers: 'kafka:9092'
    consumer:
      group-id: 'artist'
      auto-offset-reset: earliest
  datasource:
    url: 'jdbc:postgresql://rococo-all-db:5432/rococo-artist'
    username: postgres
    password: secret
  grpc:
    server:
      port: 8092
      max-inbound-message-size: 1MB
      security:
        enabled: false
---